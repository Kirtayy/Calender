<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div class="lang-switcher" role="group" aria-label="Dil seçimi">
    <button class="lang-btn" data-lang="tr">TR</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="de">DE</button>
  </div>
  <div class="user-bar hidden" id="userBar">
    <span id="userDisplayName" class="user-name"></span>
    <button id="logoutBtn" class="btn" data-i18n="logout"></button>
  </div>
</div>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <h1 data-i18n="appTitle"></h1>

    <div class="auth-tabs">
      <button type="button" id="showLoginTab" class="auth-tab active" data-i18n="login"></button>
      <button type="button" id="showRegisterTab" class="auth-tab" data-i18n="register"></button>
    </div>

    <form id="loginForm" class="auth-form">
      <label for="loginEmail" data-i18n="emailLabel"></label>
      <input type="email" id="loginEmail" required>

      <label for="loginPassword" data-i18n="passwordLabel"></label>
      <input type="password" id="loginPassword" required minlength="6">

      <button type="submit" class="btn btn-primary" data-i18n="login"></button>
    </form>

    <form id="registerForm" class="auth-form hidden">
      <label for="registerName" data-i18n="displayNameLabel"></label>
      <input type="text" id="registerName" required>

      <label for="registerEmail" data-i18n="emailLabel"></label>
      <input type="email" id="registerEmail" required>

      <label for="registerPassword" data-i18n="passwordLabel"></label>
      <input type="password" id="registerPassword" required minlength="6">

      <button type="submit" class="btn btn-primary" data-i18n="register"></button>
    </form>

    <div id="authError" class="auth-error hidden"></div>
  </div>
</div>

<div class="app hidden" id="appScreen">
  <header class="app-header">
    <div class="nav-controls">
      <button id="prevMonthBtn" class="icon-btn" aria-label="Önceki ay">&#8249;</button>
      <h1 id="monthYearLabel" class="month-year"></h1>
      <button id="nextMonthBtn" class="icon-btn" aria-label="Sonraki ay">&#8250;</button>
    </div>
    <div class="header-actions">
      <button id="todayBtn" class="btn" data-i18n="today"></button>
    </div>
  </header>

  <div class="weekday-row" id="weekdayRow"></div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalDateLabel">
    <div class="modal-header">
      <h2 id="modalDateLabel"></h2>
      <button id="closeModalBtn" class="icon-btn" aria-label="Kapat">&times;</button>
    </div>

    <div id="eventList" class="event-list"></div>

    <button id="addEventBtn" class="btn btn-primary" data-i18n="addEvent"></button>

    <form id="eventForm" class="event-form hidden">
      <input type="hidden" id="eventId">
      <label for="eventTitle" data-i18n="titleLabel"></label>
      <input type="text" id="eventTitle" required>

      <label for="eventTime" data-i18n="timeLabel"></label>
      <input type="time" id="eventTime">

      <label for="eventDescription" data-i18n="descriptionLabel"></label>
      <textarea id="eventDescription" rows="3"></textarea>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" data-i18n="save"></button>
        <button type="button" id="cancelFormBtn" class="btn" data-i18n="cancel"></button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
